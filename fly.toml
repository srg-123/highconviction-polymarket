app = "highconviction-pm"
primary_region = "ord"   # Chicago — low latency to Polymarket's US servers

[build]

[env]
  PORT = "8000"

[[services]]
  internal_port = 8000
  protocol      = "tcp"
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
    tls_options = { alpn = ["h2", "http/1.1"] }

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [services.concurrency]
    type       = "requests"
    hard_limit = 25
    soft_limit = 20

[[mounts]]
  source      = "pm_data"
  destination = "/data"
  initial_size = "2gb"   # 733 MB DB + room to grow
